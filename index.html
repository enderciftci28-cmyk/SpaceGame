<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merge Balls</title>

<style>
body{
    margin:0;
    background:#111;
    overflow:hidden;
    font-family:Arial;
    color:white;
    text-align:center;
}

canvas{
    background:#1b1b1b;
    display:block;
    margin:auto;
    border-radius:14px;
    touch-action:none;
    width:95vw;
    max-width:420px;
    height:auto;
}

h2{
    margin-top:10px;
}

#score{
    font-size:22px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<h2>🟢 Merge Balls</h2>
<div id="score">Score: 0</div>

<canvas id="game" width="420" height="700"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreText = document.getElementById("score");

const W = canvas.width;
const H = canvas.height;

let balls = [];
let currentBall;
let score = 0;
let gameOver = false;

const colors = [
    "#4ade80",
    "#60a5fa",
    "#facc15",
    "#fb7185",
    "#c084fc",
    "#f97316",
    "#22d3ee",
    "#f43f5e"
];

function randomType(){
    return Math.floor(Math.random()*3);
}

function createBall(x,y,type){

    return {
        x:x,
        y:y,
        r:22 + type*6,
        type:type,
        vy:0,
        color:colors[type % colors.length]
    };
}

function spawnNewBall(){

    currentBall = createBall(W/2,70,randomType());
}

spawnNewBall();

function update(){

    if(gameOver) return;

    for(let b of balls){

        b.vy += 0.25;
        b.y += b.vy;

        // Boden
        if(b.y + b.r > H){

            b.y = H - b.r;
            b.vy *= -0.2;
        }

        // Andere Kreise
        for(let other of balls){

            if(b === other) continue;

            let dx = other.x - b.x;
            let dy = other.y - b.y;

            let dist = Math.sqrt(dx*dx + dy*dy);

            if(dist < b.r + other.r){

                // MERGE
                if(b.type === other.type){

                    other.type++;
                    other.r += 6;

                    if(other.type >= colors.length){
                        other.type = colors.length-1;
                    }

                    other.color = colors[other.type];

                    b.remove = true;

                    score += 10;

                    scoreText.innerText = "Score: " + score;
                }
                else{

                    // leichte Physik
                    let overlap = b.r + other.r - dist;

                    let angle = Math.atan2(dy,dx);

                    b.x -= Math.cos(angle)*overlap/2;
                    b.y -= Math.sin(angle)*overlap/2;

                    other.x += Math.cos(angle)*overlap/2;
                    other.y += Math.sin(angle)*overlap/2;
                }
            }
        }
    }

    balls = balls.filter(b => !b.remove);

    // Game Over
    for(let b of balls){

        if(b.y < 60){

            gameOver = true;
        }
    }
}

function draw(){

    ctx.clearRect(0,0,W,H);

    // Linie oben
    ctx.strokeStyle = "#555";
    ctx.beginPath();
    ctx.moveTo(0,100);
    ctx.lineTo(W,100);
    ctx.stroke();

    // Vorschau Ball
    if(currentBall){

        ctx.fillStyle = currentBall.color;

        ctx.beginPath();
        ctx.arc(currentBall.x,currentBall.y,currentBall.r,0,Math.PI*2);
        ctx.fill();
    }

    // Bälle
    for(let b of balls){

        ctx.fillStyle = b.color;

        ctx.beginPath();
        ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
        ctx.fill();

        ctx.fillStyle = "rgba(255,255,255,0.4)";

        ctx.beginPath();
        ctx.arc(b.x-b.r/3,b.y-b.r/3,b.r/4,0,Math.PI*2);
        ctx.fill();
    }

    if(gameOver){

        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(60,260,300,140);

        ctx.fillStyle = "white";
        ctx.font = "bold 38px Arial";
        ctx.fillText("Game Over",95,320);

        ctx.font = "24px Arial";
        ctx.fillText("Reload zum Neustart",95,360);
    }
}

function loop(){

    update();
    draw();

    requestAnimationFrame(loop);
}

// Ball bewegen mit Maus
canvas.addEventListener("mousemove",function(e){

    const rect = canvas.getBoundingClientRect();

    let x = e.clientX - rect.left;

    let scaleX = W / rect.width;

    currentBall.x = x * scaleX;
});

// Handy
canvas.addEventListener("touchmove",function(e){

    e.preventDefault();

    const rect = canvas.getBoundingClientRect();

    let x = e.touches[0].clientX - rect.left;

    let scaleX = W / rect.width;

    currentBall.x = x * scaleX;

},{passive:false});

// Fallen lassen
function dropBall(){

    if(gameOver) return;

    balls.push(currentBall);

    spawnNewBall();
}

canvas.addEventListener("click",dropBall);

canvas.addEventListener("touchstart",function(e){

    e.preventDefault();
    dropBall();

},{passive:false});

loop();
</script>

</body>
</html>
