<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocket Escape</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
    text-align:center;
    color:white;
}

canvas{
    display:block;
    margin:auto;
    background:linear-gradient(to bottom,#000015,#000000);
    touch-action:manipulation;
}

#restartBtn{
    display:none;
    margin-top:10px;
    padding:14px 28px;
    font-size:22px;
    border:none;
    border-radius:12px;
    background:orange;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>🚀 Rocket Escape</h2>
<p>Klick / Tippen = Schiessen</p>

<canvas id="game" width="400" height="700"></canvas>

<button id="restartBtn">Neu starten</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const restartBtn = document.getElementById("restartBtn");

let rocket;
let bullets;
let meteors;
let stars;
let score;
let best;
let gameOver;

best = Number(localStorage.getItem("rocketBest")) || 0;

function resetGame(){

    rocket = {
        x:200,
        y:580,
        w:26,
        h:60
    };

    bullets = [];
    meteors = [];
    stars = [];

    score = 0;
    gameOver = false;

    restartBtn.style.display = "none";

    for(let i=0;i<100;i++){
        stars.push({
            x:Math.random()*400,
            y:Math.random()*700,
            s:Math.random()*2
        });
    }
}

function shoot(){

    if(gameOver) return;

    bullets.push({
        x:rocket.x,
        y:rocket.y-20,
        w:5,
        h:18
    });
}

function spawnMeteor(){

    meteors.push({
        x:Math.random()*350,
        y:-50,
        r:20 + Math.random()*20,
        speed:2 + Math.random()*3
    });
}

function endGame(){

    gameOver = true;

    if(score > best){
        best = score;
        localStorage.setItem("rocketBest",best);
    }

    restartBtn.style.display = "inline-block";
}

function update(){

    if(gameOver) return;

    score++;

    if(Math.random() < 0.03){
        spawnMeteor();
    }

    // Sterne bewegen
    for(let s of stars){
        s.y += 1;

        if(s.y > 700){
            s.y = 0;
            s.x = Math.random()*400;
        }
    }

    // Kugeln
    for(let b of bullets){
        b.y -= 8;
    }

    bullets = bullets.filter(b => b.y > -20);

    // Meteoriten
    for(let m of meteors){

        m.y += m.speed;

        // Kollision Rakete
        let dx = rocket.x - m.x;
        let dy = rocket.y - m.y;
        let dist = Math.sqrt(dx*dx + dy*dy);

        if(dist < m.r + 15){
            endGame();
        }

        // Kugel Treffer
        for(let b of bullets){

            let dx2 = b.x - m.x;
            let dy2 = b.y - m.y;
            let dist2 = Math.sqrt(dx2*dx2 + dy2*dy2);

            if(dist2 < m.r){

                m.dead = true;
                b.dead = true;

                score += 100;
            }
        }
    }

    meteors = meteors.filter(m => !m.dead && m.y < 800);
    bullets = bullets.filter(b => !b.dead);
}

function draw(){

    ctx.clearRect(0,0,400,700);

    // Sterne
    ctx.fillStyle = "white";

    for(let s of stars){
        ctx.fillRect(s.x,s.y,s.s,s.s);
    }

    // Raketenflamme
    ctx.fillStyle = "orange";
    ctx.beginPath();
    ctx.moveTo(rocket.x-8,rocket.y+35);
    ctx.lineTo(rocket.x,rocket.y+65+Math.random()*15);
    ctx.lineTo(rocket.x+8,rocket.y+35);
    ctx.fill();

    // Rakete
    ctx.fillStyle = "silver";

    ctx.beginPath();
    ctx.moveTo(rocket.x,rocket.y-35);
    ctx.lineTo(rocket.x-18,rocket.y+25);
    ctx.lineTo(rocket.x+18,rocket.y+25);
    ctx.fill();

    // Fenster
    ctx.fillStyle = "#55ccff";
    ctx.beginPath();
    ctx.arc(rocket.x,rocket.y-5,7,0,Math.PI*2);
    ctx.fill();

    // Flügel
    ctx.fillStyle = "red";

    ctx.beginPath();
    ctx.moveTo(rocket.x-18,rocket.y+15);
    ctx.lineTo(rocket.x-30,rocket.y+35);
    ctx.lineTo(rocket.x-10,rocket.y+25);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(rocket.x+18,rocket.y+15);
    ctx.lineTo(rocket.x+30,rocket.y+35);
    ctx.lineTo(rocket.x+10,rocket.y+25);
    ctx.fill();

    // Kugeln
    ctx.fillStyle = "yellow";

    for(let b of bullets){
        ctx.fillRect(b.x,b.y,b.w,b.h);
    }

    // Meteoriten
    ctx.fillStyle = "gray";

    for(let m of meteors){

        ctx.beginPath();
        ctx.arc(m.x,m.y,m.r,0,Math.PI*2);
        ctx.fill();

        ctx.fillStyle = "#555";
        ctx.beginPath();
        ctx.arc(m.x-5,m.y-5,m.r/4,0,Math.PI*2);
        ctx.fill();

        ctx.fillStyle = "gray";
    }

    // Score
    ctx.fillStyle = "white";
    ctx.font = "24px Arial";

    ctx.fillText("Score: " + score,20,40);
    ctx.fillText("Best: " + best,20,75);

    if(gameOver){

        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(60,250,280,150);

        ctx.fillStyle = "white";
        ctx.font = "36px Arial";
        ctx.fillText("Game Over",90,310);

        ctx.font = "24px Arial";
        ctx.fillText("Score: " + score,125,355);
    }
}

function loop(){

    update();
    draw();

    requestAnimationFrame(loop);
}

// PC
document.addEventListener("click",shoot);

// Handy
canvas.ontouchstart = function(e){
    e.preventDefault();
    shoot();
};

// Restart
restartBtn.onclick = function(){
    resetGame();
};

restartBtn.ontouchstart = function(e){
    e.preventDefault();
    resetGame();
};

resetGame();
loop();
</script>

</body>
</html>
